<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Cards</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    .stat-card {
      color: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .stat-icon {
      border: 2px solid white;
      padding: 15px;
      border-radius: 10px;
      font-size: 30px;
    }

    .stat-info h5 {
      margin: 0;
      font-weight: normal;
    }

    .stat-info h2 {
      margin: 0;
      font-weight: bold;
    }

    .bg-green { background-color: #20c997; }
    .bg-blue { background-color: #0d6efd; }
    .bg-purple { background-color: #6f42c1; }
    .bg-lightblue { background-color: #4dabf7; }
    .bg-lightgreen { background-color: #78c850; }
  </style>
</head>
<body>
  <div class="container my-5">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="stat-card bg-green">
          <div class="stat-icon"><i class="fas fa-user"></i></div>
          <div class="stat-info">
            <h5>Total Jobs Posted</h5>
            <h2>45,673</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-blue">
          <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
          <div class="stat-info">
            <h5>Total Job Seekers</h5>
            <h2>7500</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-purple">
          <div class="stat-icon"><i class="fas fa-building"></i></div>
          <div class="stat-info">
            <h5>Total Companies</h5>
            <h2>93</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-purple">
          <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
          <div class="stat-info">
            <h5>New Jobs</h5>
            <h2>86</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-lightblue">
          <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
          <div class="stat-info">
            <h5>New Job Seekers</h5>
            <h2>86</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-lightgreen">
          <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
          <div class="stat-info">
            <h5>New Companies</h5>
            <h2>75</h2>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
