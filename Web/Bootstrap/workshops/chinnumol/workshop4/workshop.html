<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <title>Document</title>
  <style>
    .maincontainer {
      height: 750px;
    }

    .mainrow {
      height: 750px;
    }

    .leftcol {
      color: white;
      background-color: #40189D;

    }

    .rightcol {
      background-color: #F2F2F2;



    }

    .sidebar {
      background-color: #40189D;
      color: white;
      min-height: 100vh;
    }

    .sidebar a {
      color: white;
      display: block;
      padding: 10px 20px;
      text-decoration: none;
    }

    .sidebar a:hover {
      /* background-color: white;
      color: black;
      border-radius: 10px; */
      /* #34127d; */
      background-color: #F2F2F2;
      color: black;
      border-bottom-left-radius: 20px;
      border-top-left-radius: 20px;
      margin-left: 10px;
    }

    .toggle-btn {
      font-size: 24px;
      color: #40189D;
      border: none;
      background: none;
    }

    .list {
      position: absolute;
      top: 150px;
      font-size: x-large;

    }

    .logo {
      position: absolute;
      top: 50px;
      left: 35px;
    }

    #jobie {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
      font-size: 50px;

    }

    .title {
      position: absolute;
      top: 0px;
      left: 100px;
    }

    #closebutton {
      position: absolute;
      left: 330px;
      top: 20px;
    }

    .logoimages {
      position: absolute;
      left: 50px;
      top: 40px;
    }

    .rightsubcol {
      display: flex;
      gap: 30px;
    }

    .rightsubcolimg {
      display: flex;
      align-items: flex-end;
      gap: 3px;
    }

    .righttoggle {
      width: 30px;
      height: 20px;

    }

    #searchinput {
      width: 400px;
      height: 40px;
      border: none;
      border-radius: 10px;
    }

    #bell {
      width: 65px;
      height: 50px;
    }

    #boy {
      width: 90px;
      height: 50px;
    }

  .stat-card {
      color: white;
      border-radius: 15px;
      padding: 20px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .stat-icon {
      border: 2px solid white;
      padding: 15px;
      border-radius: 10px;
      font-size: 30px;
    }

    .stat-info h5 {
      margin: 0;
      font-weight: normal;
    }

    .stat-info h2 {
      margin: 0;
      font-weight: bold;
    }

    .bg-green { background-color: #20c997; }
    .bg-blue { background-color: #0d6efd; }
    .bg-purple { background-color: #6f42c1; }
    .bg-lightblue { background-color: #4dabf7; }
    .bg-lightgreen { background-color: #78c850; }

    .colorboxes{
        margin-top: 100px;
    }
    .graph{
        height: 450px;
    }
 
  </style>
</head>

<body>

  <!-- Toggle Button (visible only on small screens) -->
  <div class="container-fluid d-sm-none p-2">
    <button class="toggle-btn" data-bs-toggle="collapse" data-bs-target="#sidebarMenu">
      ☰ Menu
    </button>
  </div>


  <div class="container-fluid maincontainer">
    <div class="row mainrow">

      <div class="col-sm-3 col-12 collapse d-sm-block sidebar" id="sidebarMenu">

        <div class="header">
          <div class="logoimages">
            <img class="img1" src="images/Group 8.png">
            <img class="img2" src="images/Jobie.png">
          </div>

          <div id="closebutton">
            <button type="button" class="btn-close btn-close-white" aria-label="Close" onclick="closebutton()"
              id="closenavbar"></button>
          </div>


        </div>
        <div class="list">
          <a href="#"><i class="fa fa-home me-2"></i>Dashboard</a>
          <a href="#"><i class="fa fa-briefcase me-2"></i>Job Providers</a>
          <a href="#"><i class="fa fa-user-plus me-2"></i>New Registrations</a>
          <a href="#"><i class="fa fa-search me-2"></i>Job Seekers</a>
          <a href="#"><i class="fa fa-list me-2"></i>Jobs</a>
          <a href="#"><i class="fa fa-user me-2"></i>My Profile</a>
          <a href="#"><i class="fa fa-envelope me-2"></i>Messages</a>
          <a href="#"><i class="fa fa-gear me-2"></i>Settings</a>
          <a href="#"><i class="fa fa-sign-out-alt me-2"></i>Logout</a>
        </div>

      </div>




      <!-- <div class="col-sm-3 leftcol">

                
            </div> -->
      <div class="col-sm-9 rightcol">


        <div class="container-fluid">
          <div class="row rightnavbr mt-5">
            <div class="col-3 rightsubcol"><img src="images/ic_menu.png" alt="" class="righttoggle">
              <span>
                <p><a href="" class="text-decoration-none text-black">New Registrations</a></p>
              </span>
            </div>
            <div class="col-3 rightsubcol"><input type="text" placeholder="search something here" id="searchinput"></div>
            <div class="col-3 rightsubcolimg">
              <a href=""><img src="images/noti.png" alt="" id="bell"></a>
              <a href=""><img src="images/notification.png" alt="" id="bell"></a>
              <a href=""><img src="images/profile.png" alt="" id="boy"></a>
            </div>
            <div class="col-3 rightsubcol"></div>
          </div>


          <div class="container  colorboxes">
    <div class="row g-4">
      <div class="col-md-4">
        <div class="stat-card bg-green">
          <div class="stat-icon"><i class="fas fa-user"></i></div>
          <div class="stat-info">
            <h5>Total Jobs Posted</h5>
            <h2>103</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-blue">
          <div class="stat-icon"><i class="fas fa-briefcase"></i></div>
          <div class="stat-info">
            <h5>Total JobSeekers</h5>
            <h2>53</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-purple">
          <div class="stat-icon"><i class="fas fa-building"></i></div>
          <div class="stat-info">
            <h5>Total Companies</h5>
            <h2>65</h2>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="stat-card bg-info">
          <div class="stat-icon"><i class="fas fa-calendar-alt"></i></div>
          <div class="stat-info">
            <h5>Total Jobproviders</h5>
            <h2>36</h2>
          </div>
        </div>
      </div>
      
     
    </div>
  </div>

      </div>





      <div class="container graphcontainer mt-5">
        <div class="row">
            <div class="col-12">
                <img src="/workshop4/images/jobStatistic.png" alt="" class="graph">
            </div>
        </div>
      </div> 
    </div>
